<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Книги</title>
  <link rel="icon" type="image/png" href="book.png" />
  <link rel="apple-touch-icon" href="book.png" />
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>
  <div id="app">

    <div id="screen-list" class="screen active">

      <div class="top-bar" id="top-bar">
        <div class="top-controls" id="genre-tabs">
          <button class="ctrl-btn" id="sort-btn" onclick="openSheet('sort')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
            <span id="sort-label">Тираж</span>
          </button>
          <button class="ctrl-btn genre-reset-btn" id="genre-reset-btn" onclick="resetFilters()" style="display:none">✕</button>
          <button class="ctrl-btn ctrl-genre" id="genre-btn" onclick="openSheet('genre')">
            <span id="genre-label">Все книги</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M6 9l6 6 6-6"/></svg>
          </button>
        </div>
        <div class="search-bar" id="search-bar" style="display:none">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search-input" type="text" placeholder="Поиск книг..." autocomplete="off" />
          <button class="search-close" onclick="closeSearch()">✕</button>
        </div>
      </div>

      <div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
      <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheet-title"></div>
        <div class="sheet-list" id="sheet-list"></div>
      </div>

      <div id="books-list" class="books-list"></div>
    </div>

    <div id="screen-detail" class="screen">
      <div class="detail-header">
        <button class="back-btn" onclick="prevBook()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <button class="home-btn" onclick="goHome()">Книги</button>
        <button class="next-btn" id="next-btn" onclick="nextBook()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div id="detail-content" class="detail-content"></div>
    </div>

    <button id="scroll-top-btn" onclick="scrollToTop()" aria-label="Наверх">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <path d="M12 19V5M5 12l7-7 7 7"/>
      </svg>
    </button>

    <div id="screen-sub" class="screen sub-screen-flex">
      <div class="sub-header">
        <span class="detail-title-top">Подписка</span>
        <div id="sub-vip-badge" class="sub-vip-badge sub-vip-hidden" onclick="showSubInfo()">👑 Подписка оформлена</div>
      </div>
      <div id="sub-warn-banner" class="sub-warn-banner" style="display:none"></div>
      <div class="sub-content">

        <div class="sub-hero2">
          <div class="sub-hero2-icon">👑</div>
          <div class="sub-hero2-title">Полный доступ</div>
          <div class="sub-hero2-sub">Все книги и идеи без ограничений</div>
        </div>

        <div class="sub-features">
          <div class="sub-feature"><span class="sub-feat-icon">📚</span>Более 200 книг в одном приложении</div>
          <div class="sub-feature"><span class="sub-feat-icon">🧠</span>Главные идеи каждой книги за 5 минут</div>
          <div class="sub-feature"><span class="sub-feat-icon">💳</span>Картой или криптовалютой</div>
        </div>

        <div class="sub-plans2">
          <div class="sub-plan2-wrap">
            <a class="sub-plan2" href="https://web.tribute.tg/p/xkg" target="_blank">
              <div class="sub-plan2-price">$5</div>
              <div class="sub-plan2-per">в месяц</div>
            </a>
            <div class="sub-plan2-label">Старт</div>
          </div>
          <div class="sub-plan2-wrap">
            <a class="sub-plan2 sub-plan2--best" href="https://web.tribute.tg/p/xry" target="_blank">
              <div class="sub-plan2-badge">Выгодно</div>
              <div class="sub-plan2-price">$50</div>
              <div class="sub-plan2-per">$4.17 / мес</div>
            </a>
            <div class="sub-plan2-label sub-plan2-label--gold">Про · Год</div>
          </div>
          <div class="sub-plan2-wrap">
            <a class="sub-plan2 sub-plan2--forever" href="https://web.tribute.tg/p/xrz" target="_blank">
              <div class="sub-plan2-price">$100</div>
              <div class="sub-plan2-per">один раз</div>
            </a>
            <div class="sub-plan2-label">Легенда</div>
          </div>
        </div>

      </div>

      <div class="sub-action-btns">
        <button class="sub-action-btn sub-action-btn--admin" onclick="writeAdmin()">✍️ Написать админу</button>
      </div>
    </div>

    <div id="sub-info-overlay" class="sub-info-overlay" onclick="closeSubInfo()">
      <div class="sub-info-box" onclick="event.stopPropagation()">
        <div class="sub-info-icon">⭐</div>
        <div class="sub-info-title">Ваша подписка</div>
        <div id="sub-info-text" class="sub-info-text"></div>
        <button class="sub-info-close" onclick="closeSubInfo()">Понятно</button>
      </div>
    </div>

    <nav class="bottom-nav">
      <button class="nav-btn nav-home active" onclick="goHome()">
        <img src="book.png" width="24" height="24" alt="" />
        <span>Книги</span>
      </button>
      <button class="nav-btn nav-search" onclick="openSearch()">
        <img src="search.png" width="24" height="24" alt="" />
        <span>Поиск</span>
      </button>
      <button class="nav-btn nav-sub" onclick="openSub()">
        <img src="sub.png" width="24" height="24" alt="" />
        <span>Подписка</span>
      </button>
    </nav>

  </div>
  <script src="app.js?v=14"></script>
</body>
</html>
